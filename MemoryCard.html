<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Memory - 2D Challenge</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary: #4a90e2;
            --secondary: #f39c12;
            --success: #2ecc71;
            --card-back: #2c3e50;
            --text: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* UI CONTROLS */
        .header { text-align: center; margin-bottom: 20px; }
        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-weight: bold;
            color: #333;
        }

        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
        }

        button:active { transform: scale(0.95); }
        .btn-mode { background: #ddd; }
        .btn-mode.active { background: var(--primary); color: white; }
        .btn-restart { background: var(--secondary); color: white; }

        /* GAME BOARD */
        #game-board {
            display: grid;
            gap: 15px;
            perspective: 1000px; /* Essential for 3D flip */
            max-width: 1000px;
            margin: 0 auto;
        }

        /* CARD ARCHITECTURE */
        .card {
            width: 100px;
            height: 140px;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped { transform: rotateY(180deg); }
        .card.matched { transform: rotateY(180deg) scale(0.95); opacity: 0.7; cursor: default; }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card-front {
            background-color: var(--card-back);
            color: white;
            border: 4px solid white;
        }

        .card-front::after { content: "?"; opacity: 0.3; font-size: 3rem; }

        .card-back {
            background-color: white;
            transform: rotateY(180deg);
            border: 4px solid var(--primary);
        }

        /* DIFFICULTY GRID SCALING */
        .grid-easy { grid-template-columns: repeat(4, 1fr); }
        .grid-medium { grid-template-columns: repeat(4, 1fr); }
        .grid-hard { grid-template-columns: repeat(6, 1fr); }

        @media (max-width: 600px) {
            .card { width: 70px; height: 100px; font-size: 1.5rem; }
            .grid-hard { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>MASTER MEMORY</h1>
    </div>

    <div class="controls">
        <button class="btn-mode active" onclick="setDifficulty('easy', this)">Easy (8)</button>
        <button class="btn-mode" onclick="setDifficulty('medium', this)">Medium (12)</button>
        <button class="btn-mode" onclick="setDifficulty('hard', this)">Hard (18)</button>
    </div>

    <div class="stats-container">
        <div>Moves: <span id="moves">0</span></div>
        <div>Time: <span id="timer">00:00</span></div>
        <button class="btn-restart" onclick="initGame()">Restart</button>
    </div>

    <div id="game-board"></div>

    <script>
        /**
         * GAME STATE 
         */
        const emojis = ['🚀', '🎨', '🧩', '💎', '🌈', '🍦', '🎸', '⚽', '👻', '🤖', '🦖', '🍕', '🦁', '🛸', '🏎️', '🍩', '🥑', '🧨'];
        let difficulty = 'easy';
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timerInterval = null;
        let seconds = 0;
        let isLockBoard = false;

        const board = document.getElementById('game-board');
        const moveDisplay = document.getElementById('moves');
        const timerDisplay = document.getElementById('timer');

        /**
         * INITIALIZATION & CONFIG
         */
        function setDifficulty(mode, btn) {
            difficulty = mode;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            initGame();
        }

        function initGame() {
            // Reset state
            board.innerHTML = '';
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            seconds = 0;
            isLockBoard = false;
            moveDisplay.innerText = moves;
            timerDisplay.innerText = "00:00";
            clearInterval(timerInterval);
            startTimer();

            // Set grid size based on difficulty
            const pairCount = difficulty === 'easy' ? 4 : difficulty === 'medium' ? 6 : 9;
            board.className = `grid-${difficulty}`;

            // Prepare card data
            const selectedEmojis = emojis.slice(0, pairCount);
            const gameIcons = [...selectedEmojis, ...selectedEmojis];
            
            // Shuffle using Fisher-Yates algorithm
            gameIcons.sort(() => Math.random() - 0.5);

            // Create DOM elements
            gameIcons.forEach((icon, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.icon = icon;
                card.innerHTML = `
                    <div class="card-face card-front"></div>
                    <div class="card-back card-face">${icon}</div>
                `;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        /**
         * CORE GAMEPLAY LOGIC
         */
        function flipCard() {
            if (isLockBoard) return;
            if (this === flippedCards[0]) return; // Prevent double click on same card

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                moves++;
                moveDisplay.innerText = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.icon === card2.dataset.icon;

            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            flippedCards[0].classList.add('matched');
            flippedCards[1].classList.add('matched');
            
            matchedPairs++;
            resetTurn();

            // Win condition
            const totalPairs = difficulty === 'easy' ? 4 : difficulty === 'medium' ? 6 : 9;
            if (matchedPairs === totalPairs) {
                clearInterval(timerInterval);
                setTimeout(() => alert(`Victory! Moves: ${moves} | Time: ${timerDisplay.innerText}`), 500);
            }
        }

        function unflipCards() {
            isLockBoard = true;
            setTimeout(() => {
                flippedCards[0].classList.remove('flipped');
                flippedCards[1].classList.remove('flipped');
                resetTurn();
            }, 1000);
        }

        function resetTurn() {
            flippedCards = [];
            isLockBoard = false;
        }

        /**
         * UTILITIES
         */
        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                timerDisplay.innerText = `${mins}:${secs}`;
            }, 1000);
        }

        // Boot the game
        initGame();
    </script>
</body>
</html>
