<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #555;
            background-color: #70c5ce; /* Sky Blue */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
        }
        #ui-overlay {
            position: absolute;
            text-align: center;
            color: white;
            pointer-events: none;
            user-select: none;
        }
        .btn {
            padding: 10px 20px;
            font-size: 20px;
            background: #ff5722;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            pointer-events: auto;
            display: none;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1 id="msg">Press Space/Tap to Start</h1>
        <button id="restart-btn" class="btn" onclick="resetGame()">Restart</button>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgEl = document.getElementById('msg');
    const restartBtn = document.getElementById('restart-btn');

    // Game Constants
    canvas.width = 400;
    canvas.height = 600;

    const GRAVITY = 0.25;
    const FLAP_STRENGTH = -5;
    const PIPE_SPEED = 2;
    const PIPE_SPAWN_RATE = 100; // frames
    const GAP_SIZE = 150;

    // Game Variables
    let bird, pipes, score, highScore, gameActive, frameCount;

    function init() {
        bird = {
            x: 50,
            y: canvas.height / 2,
            radius: 15,
            velocity: 0
        };
        pipes = [];
        score = 0;
        highScore = localStorage.getItem('flappyHighScore') || 0;
        gameActive = false;
        frameCount = 0;
        
        msgEl.style.display = 'block';
        msgEl.innerHTML = `High Score: ${highScore}<br>Press Space to Flap`;
        restartBtn.style.display = 'none';
        
        draw(); 
    }

    function spawnPipe() {
        const minPipeHeight = 50;
        const maxPipeHeight = canvas.height - GAP_SIZE - minPipeHeight;
        const topHeight = Math.floor(Math.random() * (maxPipeHeight - minPipeHeight + 1)) + minPipeHeight;
        
        pipes.push({
            x: canvas.width,
            top: topHeight,
            width: 50,
            passed: false
        });
    }

    function update() {
        if (!gameActive) return;

        // Bird Physics
        bird.velocity += GRAVITY;
        bird.y += bird.velocity;

        // Collision: Floor or Ceiling
        if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
            gameOver();
        }

        // Pipe Logic
        if (frameCount % PIPE_SPAWN_RATE === 0) spawnPipe();

        pipes.forEach((pipe, index) => {
            pipe.x -= PIPE_SPEED;

            // Collision Detection
            if (
                bird.x + bird.radius > pipe.x && 
                bird.x - bird.radius < pipe.x + pipe.width &&
                (bird.y - bird.radius < pipe.top || bird.y + bird.radius > pipe.top + GAP_SIZE)
            ) {
                gameOver();
            }

            // Score Logic
            if (!pipe.passed && bird.x > pipe.x + pipe.width) {
                score++;
                pipe.passed = true;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('flappyHighScore', highScore);
                }
            }

            // Remove off-screen pipes
            if (pipe.x + pipe.width < 0) pipes.splice(index, 1);
        });

        frameCount++;
    }

    function draw() {
        // Clear Background
        ctx.fillStyle = "#70c5ce";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Pipes
        pipes.forEach(pipe => {
            ctx.fillStyle = "#2ecc71"; // Pipe Green
            // Top Pipe
            ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
            ctx.strokeRect(pipe.x, 0, pipe.width, pipe.top);
            // Bottom Pipe
            ctx.fillRect(pipe.x, pipe.top + GAP_SIZE, pipe.width, canvas.height);
            ctx.strokeRect(pipe.x, pipe.top + GAP_SIZE, pipe.width, canvas.height);
        });

        // Draw Bird (Cartoon Style)
        ctx.fillStyle = "#f1c40f"; // Yellow
        ctx.beginPath();
        ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        // Eye
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(bird.x + 8, bird.y - 5, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(bird.x + 10, bird.y - 5, 2, 0, Math.PI * 2);
        ctx.fill();
        // Beak
        ctx.fillStyle = "#e67e22";
        ctx.fillRect(bird.x + 12, bird.y, 10, 5);

        // Score UI
        ctx.fillStyle = "white";
        ctx.font = "bold 30px Arial";
        ctx.fillText(`Score: ${score}`, 20, 40);
    }

    function gameOver() {
        gameActive = false;
        msgEl.innerHTML = `GAME OVER!<br>Final Score: ${score}`;
        restartBtn.style.display = 'inline-block';
    }

    function resetGame() {
        init();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // Input Handling
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            if (!gameActive && restartBtn.style.display === 'none') {
                gameActive = true;
                msgEl.style.display = 'none';
            }
            bird.velocity = FLAP_STRENGTH;
        }
    });

    // Touch support for mobile
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!gameActive && restartBtn.style.display === 'none') {
            gameActive = true;
            msgEl.style.display = 'none';
        }
        bird.velocity = FLAP_STRENGTH;
    });

    // Start
    init();
    gameLoop();
</script>
</body>
</html>
