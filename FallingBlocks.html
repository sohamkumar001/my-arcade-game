<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tetris</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #16161e;
            --neon: #00f3ff;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: var(--panel);
            border: 2px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        canvas {
            border: 2px solid #444;
            background-color: #000;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 150px;
        }
        .stat-box {
            background: #000;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid var(--neon);
            margin-bottom: 10px;
        }
        .stat-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.5rem; font-weight: bold; margin-top: 5px; }
        #next-canvas { background: #000; margin-top: 10px; border: 1px solid #333; }
        .controls-hint { font-size: 0.7rem; color: #666; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>

        <div class="side-panel">
            <div>
                <div class="stat-box">
                    <div class="stat-label">Score</div>
                    <div id="score" class="stat-value">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Level</div>
                    <div id="level" class="stat-value">1</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Next</div>
                    <canvas id="next-canvas" width="100" height="100"></canvas>
                </div>
            </div>
            
            <div class="controls-hint">
                Arrows: Move/Rotate<br>
                Space: Hard Drop<br>
                P: Pause
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-canvas');
        const nextContext = nextCanvas.getContext('2d');

        context.scale(20, 20); // Scale up for 12x20 logic units
        nextContext.scale(20, 20);

        // --- Configuration ---
        const COLORS = [
            null,
            '#FF0D72', // T
            '#0DC2FF', // I
            '#0DFF72', // S
            '#F538FF', // Z
            '#FF8E0D', // L
            '#FFE138', // O
            '#3877FF', // J
        ];

        // --- Game State ---
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let paused = false;

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            next: null,
            score: 0,
            level: 1,
            lines: 0
        };

        const arena = createMatrix(12, 20);

        // --- Logic Functions ---

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
            if (type === 'I') return [[0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0]];
            if (type === 'S') return [[0, 3, 3], [3, 3, 0], [0, 0, 0]];
            if (type === 'Z') return [[4, 4, 0], [0, 4, 4], [0, 0, 0]];
            if (type === 'L') return [[0, 5, 0], [0, 5, 0], [0, 5, 5]];
            if (type === 'O') return [[6, 6], [6, 6]];
            if (type === 'J') return [[0, 7, 0], [0, 7, 0], [7, 7, 0]];
        }

        function draw() {
            // Fill Background
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);
            
            // Draw Next Piece
            nextContext.fillStyle = '#000';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            drawMatrix(player.next, {x: 1, y: 1}, nextContext);
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = COLORS[value];
                        ctx.fillStyle = COLORS[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Subtle inner border
                        ctx.shadowBlur = 0;
                        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                player.score += rowCount * 10;
                player.lines += 1;
                rowCount *= 2;
                
                // Increase speed every 10 lines
                if (player.lines % 10 === 0) {
                    player.level++;
                    dropInterval *= 0.8;
                }
            }
            updateScore();
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (!player.next) {
                player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            }
            player.matrix = player.next;
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                player.level = 1;
                player.lines = 0;
                dropInterval = 1000;
                updateScore();
            }
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('level').innerText = player.level;
        }

        function update(time = 0) {
            if (paused) return;
            
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        // --- Interaction ---

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) playerMove(-1);        // Left
            else if (event.keyCode === 39) playerMove(1);   // Right
            else if (event.keyCode === 40) playerDrop();     // Down
            else if (event.keyCode === 38) playerRotate(1);  // Up
            else if (event.keyCode === 32) {                // Space (Hard Drop)
                while (!collide(arena, player)) {
                    player.pos.y++;
                }
                player.pos.y--;
                playerDrop();
            }
            else if (event.keyCode === 80) {                // 'P' Pause
                paused = !paused;
                if (!paused) update();
            }
        });

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
