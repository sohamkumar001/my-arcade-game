<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Tic Tac Toe</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --p1: #f43f5e;
            --p2: #10b981;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .header { text-align: center; margin-bottom: 2rem; }
        
        /* Game Controls */
        .controls {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 10px;
        }

        .btn {
            background: var(--card);
            border: 1px solid #334155;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: bold; }

        /* Scoreboard */
        .scoreboard {
            display: flex;
            gap: 40px;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            background: var(--card);
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        /* The Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background: #334155;
            padding: 10px;
            border-radius: 12px;
        }

        .cell {
            background: var(--card);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s;
        }

        .cell:hover { background: #2d3a4f; }
        .cell.taken { cursor: default; }
        
        .cell.x { color: var(--p1); }
        .cell.o { color: var(--p2); }

        .cell.winner {
            background: var(--accent);
            color: var(--bg);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .status { margin-top: 2rem; font-size: 1.5rem; height: 2rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Tic Tac Toe</h1>
        <div class="controls">
            <button id="pvp-btn" class="btn active" onclick="setMode('pvp')">Player vs Player</button>
            <button id="pva-btn" class="btn" onclick="setMode('ai')">Player vs AI</button>
        </div>
    </div>

    <div class="scoreboard">
        <div>X: <span id="score-x">0</span></div>
        <div>O: <span id="score-o">0</span></div>
    </div>

    <div class="grid" id="grid">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div class="status" id="status">Player X's Turn</div>
    
    <button class="btn" style="margin-top: 1rem;" onclick="resetBoard()">Restart Game</button>

    <script>
        const gridEl = document.getElementById('grid');
        const cells = document.querySelectorAll('.cell');
        const statusEl = document.getElementById('status');
        
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let isGameActive = true;
        let gameMode = "pvp"; // 'pvp' or 'ai'
        let scores = { X: 0, O: 0 };

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        // --- Core Logic ---

        function handleCellClick(e) {
            const index = e.target.getAttribute('data-index');
            if (board[index] !== "" || !isGameActive) return;

            makeMove(index, currentPlayer);

            if (isGameActive && gameMode === "ai" && currentPlayer === "O") {
                setTimeout(aiMove, 400); // Slight delay for realism
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            cells[index].innerText = player;
            cells[index].classList.add(player.toLowerCase(), 'taken');
            
            checkResult();
            if (isGameActive) {
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                statusEl.innerText = `Player ${currentPlayer}'s Turn`;
            }
        }

        function checkResult() {
            let roundWon = false;
            for (let condition of winConditions) {
                const [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    highlightWinner(condition);
                    break;
                }
            }

            if (roundWon) {
                statusEl.innerText = `Player ${currentPlayer} Wins!`;
                scores[currentPlayer]++;
                updateScoreboard();
                isGameActive = false;
                return;
            }

            if (!board.includes("")) {
                statusEl.innerText = "It's a Draw!";
                isGameActive = false;
            }
        }

        // --- AI Logic (Minimax) ---

        function aiMove() {
            let bestScore = -Infinity;
            let move;
            for (let i = 0; i < 9; i++) {
                if (board[i] === "") {
                    board[i] = "O";
                    let score = minimax(board, 0, false);
                    board[i] = "";
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            makeMove(move, "O");
        }

        function minimax(currBoard, depth, isMaximizing) {
            let result = checkWinnerRaw(currBoard);
            if (result !== null) {
                return result === "O" ? 10 - depth : result === "X" ? depth - 10 : 0;
            }

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (currBoard[i] === "") {
                        currBoard[i] = "O";
                        let score = minimax(currBoard, depth + 1, false);
                        currBoard[i] = "";
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (currBoard[i] === "") {
                        currBoard[i] = "X";
                        let score = minimax(currBoard, depth + 1, true);
                        currBoard[i] = "";
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function checkWinnerRaw(b) {
            for (let condition of winConditions) {
                const [a, b_idx, c] = condition;
                if (b[a] && b[a] === b[b_idx] && b[a] === b[c]) return b[a];
            }
            if (!b.includes("")) return "tie";
            return null;
        }

        // --- UI Helpers ---

        function highlightWinner(indices) {
            indices.forEach(i => cells[i].classList.add('winner'));
        }

        function updateScoreboard() {
            document.getElementById('score-x').innerText = scores.X;
            document.getElementById('score-o').innerText = scores.O;
        }

        function setMode(mode) {
            gameMode = mode;
            document.getElementById('pvp-btn').classList.toggle('active', mode === 'pvp');
            document.getElementById('pva-btn').classList.toggle('active', mode === 'ai');
            resetBoard();
        }

        function resetBoard() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            isGameActive = true;
            statusEl.innerText = "Player X's Turn";
            cells.forEach(cell => {
                cell.innerText = "";
                cell.className = "cell";
            });
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
    </script>
</body>
</html>
